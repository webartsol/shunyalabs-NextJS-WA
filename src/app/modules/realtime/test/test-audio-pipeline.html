<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShunyaLabs Audio Pipeline Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 10px; }
    #log { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: scroll; font-family: monospace; }
    .error { color: red; }
    .success { color: green; }
    .info { color: blue; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ShunyaLabs Audio Pipeline Test</h1>
    
    <div>
      <label>API Key: <input type="text" id="apiKey" placeholder="Enter your API key" style="width: 300px;"></label>
    </div>
    
    <div>
      <button id="startBtn">Start Recording</button>
      <button id="stopBtn" disabled>Stop Recording</button>
      <button id="clearBtn">Clear Log</button>
    </div>
    
    <h3>Log:</h3>
    <div id="log"></div>
  </div>

  <script>
    const log = (message, type = 'info') => {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toISOString().substr(11, 12);
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${timestamp}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    };

    let ws = null;
    let audioContext = null;
    let mediaStream = null;
    let processor = null;
    let sessionId = null;
    let frameSeq = 1;
    let audioBuffer = [];
    let bufferDuration = 0;

    const downsample = (inputData, inputRate, outputRate) => {
      if (inputRate === outputRate) return inputData;
      
      const ratio = inputRate / outputRate;
      const outputLength = Math.floor(inputData.length / ratio);
      const output = new Float32Array(outputLength);
      
      for (let i = 0; i < outputLength; i++) {
        const inputIndex = i * ratio;
        const inputIndexFloor = Math.floor(inputIndex);
        const inputIndexCeil = Math.min(inputIndexFloor + 1, inputData.length - 1);
        const fraction = inputIndex - inputIndexFloor;
        output[i] = inputData[inputIndexFloor] * (1 - fraction) + inputData[inputIndexCeil] * fraction;
      }
      
      return output;
    };

    const processAudioChunk = (inputData) => {
      const targetRate = 16000;
      const chunkDurationMs = 300;
      
      // Downsample
      const downsampled = downsample(inputData, audioContext.sampleRate, targetRate);
      
      // Add to buffer
      audioBuffer.push(downsampled);
      bufferDuration += (downsampled.length / targetRate) * 1000;
      
      // Check if we have enough data
      if (bufferDuration >= chunkDurationMs) {
        const samplesNeeded = Math.floor((chunkDurationMs / 1000) * targetRate);
        const outputBuffer = new Float32Array(samplesNeeded);
        
        let offset = 0;
        for (const chunk of audioBuffer) {
          const samplesToTake = Math.min(chunk.length, samplesNeeded - offset);
          outputBuffer.set(chunk.subarray(0, samplesToTake), offset);
          offset += samplesToTake;
          if (offset >= samplesNeeded) break;
        }
        
        // Send audio
        sendAudioFrame(outputBuffer.subarray(0, offset));
        
        // Clear buffer
        audioBuffer = [];
        bufferDuration = 0;
      }
    };

    const arrayBufferToBase64 = (buffer) => {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    };

    const sendAudioFrame = (audioData) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      
      const base64Audio = arrayBufferToBase64(audioData.buffer);
      const frame = {
        action: 'send',
        type: 'frame',
        session_id: sessionId,
        frame_seq: frameSeq++,
        audio_inline_b64: base64Audio,
        dtype: 'float32',
        channels: 1,
        sr: 16000
      };
      
      const durationMs = (audioData.length / 16000) * 1000;
      log(`Sending frame ${frame.frame_seq}: ${audioData.length} samples (${durationMs.toFixed(1)}ms)`);
      
      ws.send(JSON.stringify(frame));
    };

    const sendEndOfAudio = () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      
      const endOfAudio = new TextEncoder().encode('END_OF_AUDIO');
      const base64 = arrayBufferToBase64(endOfAudio.buffer);
      
      const frame = {
        action: 'send',
        type: 'frame',
        session_id: sessionId,
        frame_seq: frameSeq++,
        audio_inline_b64: base64,
        dtype: 'float32',
        channels: 1,
        sr: 16000
      };
      
      log('Sending END_OF_AUDIO');
      ws.send(JSON.stringify(frame));
    };

    const startRecording = async () => {
      const apiKey = document.getElementById('apiKey').value;
      if (!apiKey) {
        log('Please enter API key', 'error');
        return;
      }

      try {
        // Connect WebSocket
        sessionId = `test-${Date.now()}`;
        const wsUrl = `wss://tl.shunyalabs.ai/?api_key=${encodeURIComponent(apiKey)}`;
        
        log('Connecting to WebSocket...');
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          log('WebSocket connected', 'success');
          
          // Send INIT
          const init = {
            action: 'send',
            type: 'init',
            session_id: sessionId,
            config: {
              uid: `client-test-${Date.now()}`,
              language: 'en',
              task: 'transcribe',
              model: 'pingala-v1-universal',
              client_sample_rate: 16000,
              deliver_deltas_only: true,
              api_key: apiKey
            }
          };
          
          log('Sending INIT message');
          ws.send(JSON.stringify(init));
          
          // Start audio capture
          startAudioCapture();
        };
        
        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            
            if (data.message === 'SERVER_READY') {
              log('Server ready: ' + data.backend, 'success');
            } else if (data.language) {
              log(`Language detected: ${data.language} (${data.language_prob})`, 'info');
            } else if (data.segments) {
              data.segments.forEach(seg => {
                const tag = seg.completed ? 'FINAL' : 'PARTIAL';
                log(`[${tag}] "${seg.text}"`, seg.completed ? 'success' : 'info');
              });
            } else if (data.event === 'STREAM_END') {
              log('Stream ended', 'success');
            } else if (data.type === 'error') {
              log('Error: ' + data.message, 'error');
            } else {
              log('Unknown message: ' + JSON.stringify(data));
            }
          } catch (e) {
            log('Failed to parse message: ' + e.message, 'error');
          }
        };
        
        ws.onerror = (error) => {
          log('WebSocket error', 'error');
        };
        
        ws.onclose = (event) => {
          log(`WebSocket closed: ${event.code} ${event.reason}`);
          stopRecording();
        };
        
      } catch (error) {
        log('Failed to start: ' + error.message, 'error');
      }
    };

    const startAudioCapture = async () => {
      try {
        // Get microphone access
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        log('Microphone access granted', 'success');
        
        // Create audio context
        audioContext = new AudioContext();
        log(`Audio context created: ${audioContext.sampleRate}Hz`);
        
        // Create processor
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(2048, 1, 1);
        
        processor.onaudioprocess = (e) => {
          const inputData = e.inputBuffer.getChannelData(0);
          processAudioChunk(new Float32Array(inputData));
        };
        
        source.connect(processor);
        processor.connect(audioContext.createGain());
        
        // Update UI
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        
        frameSeq = 1;
        audioBuffer = [];
        bufferDuration = 0;
        
        log('Audio capture started', 'success');
        
      } catch (error) {
        log('Failed to start audio: ' + error.message, 'error');
      }
    };

    const stopRecording = () => {
      // Send any remaining audio
      if (audioBuffer.length > 0) {
        let totalSamples = 0;
        audioBuffer.forEach(chunk => totalSamples += chunk.length);
        
        if (totalSamples > 0) {
          const finalBuffer = new Float32Array(totalSamples);
          let offset = 0;
          audioBuffer.forEach(chunk => {
            finalBuffer.set(chunk, offset);
            offset += chunk.length;
          });
          
          sendAudioFrame(finalBuffer);
        }
      }
      
      // Send END_OF_AUDIO
      sendEndOfAudio();
      
      // Cleanup
      if (processor) {
        processor.disconnect();
        processor = null;
      }
      
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      
      // Close WebSocket after a delay
      setTimeout(() => {
        if (ws) {
          ws.close();
          ws = null;
        }
      }, 2000);
      
      // Update UI
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      
      log('Recording stopped');
    };

    // Event handlers
    document.getElementById('startBtn').onclick = startRecording;
    document.getElementById('stopBtn').onclick = stopRecording;
    document.getElementById('clearBtn').onclick = () => {
      document.getElementById('log').innerHTML = '';
    };
  </script>
</body>
</html>
