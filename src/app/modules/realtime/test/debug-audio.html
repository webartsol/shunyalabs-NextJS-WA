<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Pipeline Debug</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 5px; }
    #log { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
    .error { color: red; }
    .success { color: green; }
    .info { color: blue; }
    .warn { color: orange; }
    #visualizer { width: 100%; height: 100px; border: 1px solid #ccc; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Audio Pipeline Debug</h1>
    
    <div>
      <button id="startBtn">Start Audio Capture</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="clearBtn">Clear Log</button>
    </div>
    
    <canvas id="visualizer"></canvas>
    
    <h3>Log:</h3>
    <div id="log"></div>
  </div>

  <script>
    const log = (message, type = 'info') => {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toISOString().substr(11, 12);
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${timestamp}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    };

    let audioContext = null;
    let mediaStream = null;
    let processor = null;
    let analyser = null;
    let isRecording = false;
    let audioBuffer = [];
    let bufferDuration = 0;
    let frameCount = 0;
    let silentFrames = 0;
    let activeFrames = 0;

    // Visualizer
    let animationId = null;
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    const visualize = () => {
      if (!analyser) return;
      
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);
      
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      
      canvasCtx.fillStyle = 'rgb(255, 255, 255)';
      canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
      
      canvasCtx.lineWidth = 2;
      canvasCtx.strokeStyle = 'rgb(0, 0, 0)';
      canvasCtx.beginPath();
      
      const sliceWidth = canvas.width * 1.0 / bufferLength;
      let x = 0;
      
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * canvas.height / 2;
        
        if (i === 0) {
          canvasCtx.moveTo(x, y);
        } else {
          canvasCtx.lineTo(x, y);
        }
        
        x += sliceWidth;
      }
      
      canvasCtx.lineTo(canvas.width, canvas.height / 2);
      canvasCtx.stroke();
      
      animationId = requestAnimationFrame(visualize);
    };

    const startCapture = async () => {
      try {
        log('Requesting microphone access...', 'info');
        
        // Get microphone
        mediaStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          } 
        });
        
        log('✅ Microphone access granted', 'success');
        
        // Create audio context
        audioContext = new AudioContext();
        log(`Audio context created: ${audioContext.sampleRate}Hz, state: ${audioContext.state}`, 'info');
        
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
          log('Audio context resumed', 'info');
        }
        
        // Create analyser
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        
        // Create nodes
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(2048, 1, 1);
        
        let processCount = 0;
        processor.onaudioprocess = (e) => {
          processCount++;
          const inputData = e.inputBuffer.getChannelData(0);
          
          // Calculate audio level
          const maxValue = Math.max(...inputData.map(Math.abs));
          const avgValue = inputData.reduce((sum, val) => sum + Math.abs(val), 0) / inputData.length;
          
          if (processCount % 10 === 0) { // Log every 10th frame to avoid spam
            log(`Frame ${processCount}: ${inputData.length} samples, max: ${maxValue.toFixed(4)}, avg: ${avgValue.toFixed(4)}`, 
                maxValue > 0.01 ? 'success' : 'warn');
          }
          
          if (maxValue < 0.001) {
            silentFrames++;
          } else {
            activeFrames++;
          }
          
          frameCount++;
          
          // Simulate chunking
          audioBuffer.push(new Float32Array(inputData));
          bufferDuration += (inputData.length / audioContext.sampleRate) * 1000;
          
          if (bufferDuration >= 300) { // 300ms chunks
            const totalSamples = audioBuffer.reduce((sum, chunk) => sum + chunk.length, 0);
            log(`📦 Chunk ready: ${totalSamples} samples (${bufferDuration.toFixed(1)}ms)`, 'info');
            log(`   Stats: ${activeFrames} active frames, ${silentFrames} silent frames`, 'info');
            
            // Reset buffer
            audioBuffer = [];
            bufferDuration = 0;
          }
        };
        
        // Connect nodes
        source.connect(analyser);
        source.connect(processor);
        processor.connect(audioContext.createGain()); // Don't connect to speakers
        
        isRecording = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        
        log('✅ Audio pipeline started', 'success');
        log(`Recording: ${isRecording}, Processor: ${processor !== null}`, 'info');
        
        // Start visualizer
        visualize();
        
      } catch (error) {
        log(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    };

    const stopCapture = () => {
      if (processor) {
        processor.disconnect();
        processor = null;
      }
      
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      
      isRecording = false;
      
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      
      log('🛑 Audio pipeline stopped', 'info');
      log(`Total frames: ${frameCount}, Active: ${activeFrames}, Silent: ${silentFrames}`, 'info');
      
      // Reset counters
      frameCount = 0;
      activeFrames = 0;
      silentFrames = 0;
    };

    // Event handlers
    document.getElementById('startBtn').onclick = startCapture;
    document.getElementById('stopBtn').onclick = stopCapture;
    document.getElementById('clearBtn').onclick = () => {
      document.getElementById('log').innerHTML = '';
    };
    
    // Initial log
    log('Ready to test audio capture', 'info');
    log('Click "Start Audio Capture" and speak into your microphone', 'info');
  </script>
</body>
</html>
